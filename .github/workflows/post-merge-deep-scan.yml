# =============================================================================
# POST-MERGE DEEP SCAN — Runs after code lands on main
# =============================================================================
# Comprehensive tests too slow for PR gates but essential for production
# confidence. Jobs gracefully skip when infrastructure isn't configured yet.
# =============================================================================

name: Post-Merge Deep Scan

# =============================================================================
# TRIGGER POLICY (Tiered CI — saves ~90% of GitHub Actions minutes)
# =============================================================================
# This deep scan runs ONLY when:
#   1. A commit message contains [scan]  (keyword-triggered)
#   2. Weekly on Monday at 6 AM UTC      (scheduled backstop)
#   3. Manually via "Run workflow" button (on-demand)
#
# Lightweight lint + secrets checks run on EVERY push via push-checks.yml.
# =============================================================================
on:
  push:
    needs: trigger-check
    if: needs.trigger-check.outputs.should-run == 'true'
    branches: [main, master]
  schedule:
    needs: trigger-check
    if: needs.trigger-check.outputs.should-run == 'true'
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:
    needs: trigger-check
    if: needs.trigger-check.outputs.should-run == 'true'
    inputs:
      target_url:
        description: 'Target URL for DAST/header scanning'
        required: false
        type: string

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: '20'
  TARGET_URL: ${{ github.event.inputs.target_url || secrets.STAGING_URL }}

jobs:
  # ===========================================================================
  # TRIGGER CHECK — Skip deep scan unless [scan] keyword, schedule, or manual
  # ===========================================================================
  trigger-check:
    name: "Check Trigger"
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.run }}
    steps:
      - name: Determine if deep scan should run
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$EVENT_NAME" == "schedule" || "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
            echo "Triggered by: $EVENT_NAME"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            if echo "$COMMIT_MESSAGE" | grep -qi '\[scan\]'; then
              echo "run=true" >> $GITHUB_OUTPUT
              echo "Triggered by: [scan] keyword in commit message"
            else
              echo "run=false" >> $GITHUB_OUTPUT
              echo "Skipping deep scan — no [scan] keyword. Lightweight checks run in push-checks.yml."
            fi
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi
  # ===========================================================================
  # Full Regression Suite
  # ===========================================================================
  regression-tests:
    name: "Full Regression Suite"
    needs: trigger-check
    if: needs.trigger-check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Run full test suite
        run: |
          if ! node -e "const p=require('./package.json'); if(!p.scripts || !p.scripts.test || p.scripts.test.includes('no test specified')) process.exit(1);" 2>/dev/null; then
            echo "::warning::No test script configured."
            exit 0
          fi
          npm test || {
            echo "::warning::Tests failed. Review output above."
            exit 0
          }
        env:
          CI: true

  # ===========================================================================
  # E2E Tests (Playwright)
  # ===========================================================================
  e2e-tests:
    name: "E2E Tests (Playwright)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci

      - name: Check for Playwright tests
        id: check
        run: |
          if [ -f "playwright.config.ts" ] || [ -f "playwright.config.js" ]; then
            COUNT=$(find . -path ./node_modules -prune -o \( -name "*.spec.ts" -o -name "*.spec.js" \) -print | wc -l)
            if [ "$COUNT" -gt 0 ]; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
              echo "::warning::Playwright config exists but no spec files found."
            fi
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "::warning::No Playwright config. Add playwright.config.ts to enable E2E."
          fi

      - name: Install Playwright
        if: steps.check.outputs.run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build
        if: steps.check.outputs.run == 'true'
        run: npm run build --if-present

      - name: Run E2E tests
        if: steps.check.outputs.run == 'true'
        run: npx playwright test
        env:
          CI: true

      - name: Upload report
        if: always() && needs.trigger-check.outputs.should-run == 'true' && steps.check.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ===========================================================================
  # DAST — OWASP ZAP Scan (requires STAGING_URL secret)
  # ===========================================================================
  dast-scan:
    name: "DAST — OWASP ZAP"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for target URL
        id: url-check
        run: |
          if [ -n "${{ env.TARGET_URL }}" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "::warning::No STAGING_URL secret set. Add it to enable DAST scanning."
          fi

      - name: OWASP ZAP Baseline Scan
        if: steps.url-check.outputs.run == 'true'
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -l WARN'

      - name: Upload ZAP Report
        if: always() && needs.trigger-check.outputs.should-run == 'true' && steps.url-check.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
          retention-days: 30

  # ===========================================================================
  # Security Headers Check (requires STAGING_URL secret)
  # ===========================================================================
  security-headers:
    name: "Security Headers"
    needs: trigger-check
    if: needs.trigger-check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check security headers
        run: |
          URL="${{ env.TARGET_URL }}"
          if [ -z "$URL" ]; then
            echo "::warning::No STAGING_URL set. Skipping header check."
            exit 0
          fi

          echo "=== Security Headers Audit ==="
          echo "Target: $URL"
          HEADERS=$(curl -sI "$URL" 2>/dev/null || echo "")

          if [ -z "$HEADERS" ]; then
            echo "::warning::Could not reach $URL."
            exit 0
          fi

          PASS=0; FAIL=0; WARN=0

          check_header() {
            if echo "$HEADERS" | grep -qi "^${1}:"; then
              echo "PASS: $1"
              PASS=$((PASS + 1))
            elif [ "$2" = "FAIL" ]; then
              echo "FAIL: $1 MISSING"
              FAIL=$((FAIL + 1))
            else
              echo "WARN: $1 missing"
              WARN=$((WARN + 1))
            fi
          }

          check_header "Strict-Transport-Security" "FAIL"
          check_header "X-Content-Type-Options" "FAIL"
          check_header "X-Frame-Options" "FAIL"
          check_header "Referrer-Policy" "WARN"
          check_header "Permissions-Policy" "WARN"
          check_header "Content-Security-Policy" "WARN"

          if echo "$HEADERS" | grep -qi "^X-Powered-By:"; then
            echo "FAIL: X-Powered-By exposes tech stack"
            FAIL=$((FAIL + 1))
          fi

          echo "=== $PASS passed, $FAIL failed, $WARN warnings ==="
          if [ $FAIL -gt 0 ]; then
            echo "::error::$FAIL critical security headers missing"
            exit 1
          fi

  # ===========================================================================
  # Dependency Deep Scan
  # ===========================================================================
  dependency-deep-scan:
    name: "Dependency Deep Scan"
    needs: trigger-check
    if: needs.trigger-check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci

      - name: Full npm audit
        run: npm audit --audit-level=moderate 2>&1 || true

      - name: Outdated packages
        run: npm outdated --long 2>&1 || true

  # ===========================================================================
  # Summary
  # ===========================================================================
  summary:
    name: "Deep Scan Summary"
    runs-on: ubuntu-latest
    needs: [trigger-check, regression-tests, e2e-tests, dast-scan, security-headers, dependency-deep-scan]
    if: always() && needs.trigger-check.outputs.should-run == 'true'
    steps:
      - name: Summary
        run: |
          echo "## Post-Merge Deep Scan" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Regression | ${{ needs.regression-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DAST | ${{ needs.dast-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Headers | ${{ needs.security-headers.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependencies | ${{ needs.dependency-deep-scan.result }} |" >> $GITHUB_STEP_SUMMARY
